
services:
  mariadb:
    image: mariadb:11.4
    container_name: atd-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: atdiopy_db
    ports:
      - "3333:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: atd-phpmyadmin
    restart: always
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: root123
    ports:
      - "9090:80"

volumes:
  mariadb_data:
